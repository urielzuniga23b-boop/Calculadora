<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Órbita Básica</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #010103; /* Fondo base muy oscuro */
        }

        /* Canvas para el fondo de meteoritos animado */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Asegura que esté detrás de todo */
            display: block;
        }

        .calculator {
            background-color: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(230, 0, 0, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.3);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }

        /* Contenedor principal de pantallas */
        .screens-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        /* Estilo de cada pantalla independiente */
        .display-box {
            width: 42%;
            height: 60px;
            background-color: rgba(30, 30, 45, 0.8);
            border: 2px solid #444;
            border-radius: 12px;
            color: #ffffff;
            font-size: 26px;
            text-align: right;
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Efecto cuando la pantalla está seleccionada */
        .display-box.active-screen {
            border-color: #3498db;
            box-shadow: 0 0 12px rgba(52, 152, 219, 0.6);
            background-color: rgba(40, 40, 60, 1);
        }

        /* Selector de operación (Centro) */
        .op-selector {
            width: 50px;
            height: 50px;
            background-color: transparent;
            border: none;
            color: #f1c40f;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        /* Reestructuración de la cuadrícula de botones para 5 columnas básicas */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        button:active { transform: scale(0.92); }
        button:hover { filter: brightness(1.3); }
        
        /* Botones de Números y Operaciones */
        .btn-number { background-color: #444; color: white; }
        .btn-op { background-color: #d35400; color: white; }
        .btn-clear { background-color: #c0392b; color: white; }
        .btn-equal { background-color: #27ae60; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<canvas id="space-bg"></canvas>

<div class="calculator">
    <div class="screens-container">
        <input type="text" id="screen-a" class="display-box active-screen" readonly placeholder="" onclick="setTarget('a')">
        <div class="op-selector" id="op-view">?</div>
        <input type="text" id="screen-b" class="display-box" readonly placeholder="" onclick="setTarget('b')">
    </div>

    <div class="grid">
        <button class="btn-clear" onclick="clearCalculator()">C</button>
        <button class="btn-clear" onclick="backspace()">⌫</button>
        <button class="btn-number" onclick="press('7')">7</button>
        <button class="btn-number" onclick="press('8')">8</button>
        <button class="btn-number" onclick="press('9')">9</button>

        <button class="btn-op" onclick="setOp('/')">÷</button>
        <button class="btn-op" onclick="setOp('*')">×</button>
        <button class="btn-number" onclick="press('4')">4</button>
        <button class="btn-number" onclick="press('5')">5</button>
        <button class="btn-number" onclick="press('6')">6</button>

        <button class="btn-op" onclick="setOp('-')">−</button>
        <button class="btn-op" onclick="setOp('+')">+</button>
        <button class="btn-number" onclick="press('1')">1</button>
        <button class="btn-number" onclick="press('2')">2</button>
        <button class="btn-number" onclick="press('3')">3</button>

        <button class="btn-number" onclick="press('0')" style="grid-column: span 3;">0</button>
        <button class="btn-number" onclick="press('.')">.</button>
        <button class="btn-equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    // --- LÓGICA DE LA CALCULADORA ORBITAL ---
    let currentTarget = 'a'; // Puede ser 'a' o 'b'
    let currentOperation = '';
    const screenA = document.getElementById('screen-a');
    const screenB = document.getElementById('screen-b');
    const opView = document.getElementById('op-view');

    // Define en qué casilla se escribirán los números
    function setTarget(target) {
        currentTarget = target;
        updateFocusStyles();
    }

    // Actualiza visualmente qué casilla está activa
    function updateFocusStyles() {
        if (currentTarget === 'a') {
            screenA.classList.add('active-screen');
            screenB.classList.remove('active-screen');
        } else {
            screenB.classList.add('active-screen');
            screenA.classList.remove('active-screen');
        }
    }

    // Añade números o PI a la casilla activa
    function press(value) {
        if (currentTarget === 'a') {
            screenA.value += value;
        } else {
            screenB.value += value;
        }
    }

    // Establece la operación que se va a realizar
    function setOp(op) {
        currentOperation = op;
        // Mostramos un símbolo limpio en el centro
        let opDisplay = op;
        if (opDisplay === '/') opDisplay = '÷';
        if (opDisplay === '*') opDisplay = '×';
        opView.innerText = opDisplay;
        
        // Al elegir operación, saltamos automáticamente a la Opción B
        currentTarget = 'b';
        updateFocusStyles();
    }

    function clearCalculator() {
        screenA.value = '';
        screenB.value = '';
        opView.innerText = '?';
        currentOperation = '';
        currentTarget = 'a';
        updateFocusStyles();
    }

    function backspace() {
        let activeScreen = (currentTarget === 'a') ? screenA : screenB;
        activeScreen.value = activeScreen.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valA = screenA.value.trim();
            let valB = screenB.value.trim();
            let op = currentOperation;
            let result;

            if (!valA || !valB || !op) {
                return; // No calculamos si faltan datos
            }

            // Construimos la expresión matemática final
            let expression = valA + op + valB;

            // Evaluamos la expresión
            result = eval(expression);

            if (isNaN(result) || !isFinite(result)) {
                screenA.value = "Error";
            } else {
                // Mostramos el resultado formateado en la Opción A
                let formattedRes = Number(result.toFixed(6)).toString();
                screenA.value = formattedRes;
            }
            
            // Limpiamos operador y Opción B para la siguiente operación
            screenB.value = '';
            opView.innerText = '?';
            currentOperation = '';
            currentTarget = 'a';
            updateFocusStyles();

        } catch (error) {
            screenA.value = "Error";
        }
    }

    // --- MOTOR DE ANIMACIÓN ESPACIAL (CANVAS) ARREGLADO ---
    const canvas = document.getElementById('space-bg');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Ejecutar al inicio

    // Estructura de un meteorito
    class Meteor {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * canvas.width * 1.5; // Aparecen a la derecha
            this.y = Math.random() * -300 - 50;          // Aparecen arriba fuera de pantalla
            this.length = Math.random() * 80 + 50;     // Largo de la estela
            this.speed = Math.random() * 6 + 4;         // Velocidad de caída
            this.thickness = Math.random() * 2 + 1;     // Grosor
            this.alpha = Math.random() * 0.5 + 0.5;     // Transparencia
        }

        update() {
            // Se mueven diagonalmente (izquierda-abajo)
            this.x -= this.speed * 0.7;
            this.y += this.speed;

            // Si sale de la pantalla, se reinicia
            if (this.y > canvas.height + 100 || this.x < -150) {
                this.reset();
            }
        }

        draw() {
            ctx.beginPath();
            // Degradado de la estela (fuego -> transparente)
            let gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.length * 0.7, this.y - this.length);
            gradient.addColorStop(0, `rgba(255, 70, 50, ${this.alpha})`);   // Rojo naranja brillante
            gradient.addColorStop(0.2, `rgba(255, 10, 10, ${this.alpha * 0.5})`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');                    // Desvanecido total

            ctx.strokeStyle = gradient;
            ctx.lineWidth = this.thickness;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.length * 0.7, this.y - this.length);
            ctx.stroke();
        }
    }

    // Crear una lista de meteoritos
    const meteors = [];
    const maxMeteors = 20; // Cantidad de meteoritos simultáneos
    for (let i = 0; i < maxMeteors; i++) {
        meteors.push(new Meteor());
    }

    // Bucle de animación principal
    function animate() {
        // Fondo negro semi-transparente para el efecto 'trail' (estela difuminada)
        ctx.fillStyle = 'rgba(1, 1, 3, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Actualizar y dibujar meteoritos
        meteors.forEach(meteor => {
            meteor.update();
            meteor.draw();
        });

        requestAnimationFrame(animate); // Llamar al siguiente frame
    }

    animate(); // Iniciar animación
</script>

</body>
</html>
