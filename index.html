<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Espacial</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050510;
        }

        /* Canvas para el fondo de meteoritos */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .calculator {
            background-color: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(139, 0, 0, 0.3);
            border: 1px solid rgba(230, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        /* Doble pantalla (Arriba y Abajo) */
        .display-container {
            background-color: #2d2d2d;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            border: 2px solid #444;
            transition: border-color 0.3s;
        }

        .display-input {
            width: 100%;
            height: 35px;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 22px;
            text-align: right;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
        }

        /* Línea divisoria estilo fracción */
        .display-divider {
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            margin: 2px 0;
        }

        /* Indicador visual de qué campo está seleccionado */
        .display-input.active {
            color: #2ecc71;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.2); }
        
        .btn-number { background-color: #4a4a4a; color: white; }
        .btn-sci { background-color: #2c3e50; color: #3498db; font-size: 14px; }
        .btn-op { background-color: #d35400; color: white; }
        .btn-clear { background-color: #c0392b; color: white; }
        .btn-equal { background-color: #27ae60; color: white; grid-column: span 2; }
        
        /* Botón para alternar entre arriba y abajo */
        .btn-toggle {
            background-color: #8e44ad;
            color: #f1c40f;
            font-size: 13px;
        }
    </style>
</head>
<body>

<canvas id="space-bg"></canvas>

<div class="calculator">
    <div class="display-container" id="display-box">
        <input type="text" id="screen-top" class="display-input active" readonly placeholder="Arriba (10)" onclick="switchScreen('top')">
        <div class="display-divider"></div>
        <input type="text" id="screen-bottom" class="display-input" readonly placeholder="Abajo (2)" onclick="switchScreen('bottom')">
    </div>

    <div class="grid">
        <button class="btn-sci" onclick="press('Math.sin(')">sin</button>
        <button class="btn-sci" onclick="press('Math.cos(')">cos</button>
        <button class="btn-sci" onclick="press('Math.tan(')">tan</button>
        <button class="btn-clear" onclick="clearScreen()">C</button>
        <button class="btn-clear" onclick="backspace()">⌫</button>

        <button class="btn-sci" onclick="press('Math.log10(')">log</button>
        <button class="btn-sci" onclick="press('Math.sqrt(')">√</button>
        <button class="btn-sci" onclick="press('Math.PI')">π</button>
        <button class="btn-sci" onclick="press('**')">^</button>
        <button class="btn-toggle" onclick="toggleScreen()">⬘/⬙</button>

        <button class="btn-number" onclick="press('7')">7</button>
        <button class="btn-number" onclick="press('8')">8</button>
        <button class="btn-number" onclick="press('9')">9</button>
        <button class="btn-sci" onclick="press('(')">(</button>
        <button class="btn-op" onclick="press('/')">/</button>

        <button class="btn-number" onclick="press('4')">4</button>
        <button class="btn-number" onclick="press('5')">5</button>
        <button class="btn-number" onclick="press('6')">6</button>
        <button class="btn-sci" onclick="press(')')">)</button>
        <button class="btn-op" onclick="press('*')">*</button>

        <button class="btn-number" onclick="press('1')">1</button>
        <button class="btn-number" onclick="press('2')">2</button>
        <button class="btn-number" onclick="press('3')">3</button>
        <button class="btn-op" onclick="press('-')">-</button>
        <button class="btn-equal" onclick="calculate()">=</button>

        <button class="btn-number" onclick="press('0')" style="grid-column: span 2;">0</button>
        <button class="btn-number" onclick="press('.')">.</button>
        <button class="btn-op" onclick="press('+')" style="grid-column: span 2;">+</button>
    </div>
</div>

<script>
    // --- LÓGICA DE LA CALCULADORA DE DOS ESPACIOS ---
    let currentTarget = 'top'; // Puede ser 'top' (arriba) o 'bottom' (abajo)
    const screenTop = document.getElementById('screen-top');
    const screenBottom = document.getElementById('screen-bottom');
    const displayBox = document.getElementById('display-box');

    function updateFocusClass() {
        if (currentTarget === 'top') {
            screenTop.classList.add('active');
            screenBottom.classList.remove('active');
            displayBox.style.borderColor = "#3498db"; // Borde azul si editas arriba
        } else {
            screenBottom.classList.add('active');
            screenTop.classList.remove('remove');
            screenTop.classList.remove('active');
            screenBottom.classList.add('active');
            displayBox.style.borderColor = "#2ecc71"; // Borde verde si editas abajo
        }
    }

    function switchScreen(target) {
        currentTarget = target;
        updateFocusClass();
    }

    function toggleScreen() {
        currentTarget = (currentTarget === 'top') ? 'bottom' : 'top';
        updateFocusClass();
    }

    function press(value) {
        if (currentTarget === 'top') {
            screenTop.value += value;
        } else {
            screenBottom.value += value;
        }
    }

    function clearScreen() {
        screenTop.value = '';
        screenBottom.value = '';
        currentTarget = 'top';
        updateFocusClass();
    }

    function backspace() {
        let activeScreen = (currentTarget === 'top') ? screenTop : screenBottom;
        activeScreen.value = activeScreen.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valTop = screenTop.value.trim() || "0";
            let valBottom = screenBottom.value.trim() || "1";

            // Evaluamos de forma independiente la expresión de arriba y la de abajo
            let resTop = eval(valTop);
            let resBottom = eval(valBottom);

            // Al presionar '=', calculamos la fracción total: Arriba / Abajo
            let finalResult = resTop / resBottom;

            if (isNaN(finalResult) || !isFinite(finalResult)) {
                screenTop.value = "Error";
                screenBottom.value = "";
            } else {
                // Mostramos el resultado simplificado arriba y limpiamos abajo
                screenTop.value = Number(finalResult.toFixed(6));
                screenBottom.value = "";
                currentTarget = 'top';
                updateFocusClass();
            }
        } catch (error) {
            screenTop.value = "Error";
            screenBottom.value = "";
        }
    }

    // --- ANIMACIÓN DE METEORITOS (CANVAS) ---
    const canvas = document.getElementById('space-bg');
    const ctx = canvas.getContext('2document');
    const context = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Estructura de un meteorito
    class Meteor {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * canvas.width * 1.3; 
            this.y = -20;
            this.length = Math.random() * 80 + 40; // Largo de la estela
            this.speed = Math.random() * 5 + 4;     // Velocidad de caída
            this.thickness = Math.random() * 2 + 1; // Grosor
            this.alpha = Math.random() * 0.5 + 0.5; // Transparencia
        }

        update() {
            // Se mueven en diagonal (hacia abajo y a la izquierda)
            this.x -= this.speed * 0.7;
            this.y += this.speed;

            // Si se sale de la pantalla, se reinicia arriba
            if (this.y > canvas.height || this.x < -100) {
                this.reset();
            }
        }

        draw() {
            context.beginPath();
            // Creamos un degradado para simular el fuego/estela del meteorito
            let gradient = context.createLinearGradient(this.x, this.y, this.x + this.length * 0.7, this.y - this.length);
            gradient.addColorStop(0, `rgba(255, 69, 0, ${this.alpha})`);   // Rojo-Naranja brillante en la punta
            gradient.addColorStop(0.2, `rgba(230, 0, 0, ${this.alpha * 0.5})`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');                  // Desvanecido al final

            context.strokeStyle = gradient;
            context.lineWidth = this.thickness;
            context.moveTo(this.x, this.y);
            context.lineTo(this.x + this.length * 0.7, this.y - this.length);
            context.stroke();
        }
    }

    // Crear una lista de meteoritos
    const meteors = [];
    const maxMeteors = 15;
    for (let i = 0; i < maxMeteors; i++) {
        meteors.push(new Meteor());
    }

    // Bucle de animación
    function animate() {
        // Fondo semi-transparente negro para dejar un ligero rastro sutil en los meteoritos
        context.fillStyle = 'rgba(5, 5, 16, 0.3)';
        context.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar y actualizar meteoritos
        meteors.forEach(meteor => {
            meteor.update();
            meteor.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
