        /* Canvas para los meteoritos (pasan sutilmente por encima de Goku) */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor transparente (estilo Glassmorphism de tu captura) */
        .calculator {
            background-color: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(135, 206, 250, 0.5); 
            box-shadow: 0 0 30px rgba(135, 206, 250, 0.3);
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 10;
        }

        .screens-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .screen-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .screen-label {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
            text-transform: lowercase;
        }

        .label-green { color: #5adbb5; }
        .label-blue { color: #3498db; }
        .label-yellow { color: #f1c40f; }
        .label-orange { color: #e67e22; }

        .screen-title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .title-result { color: #2ecc71; }
        .title-a { color: #2980b9; }
        .title-b { color: #d35400; }

        .display-box {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: #ffffff;
            font-size: 22px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
            width: 100%;
            height: 45px;
        }

        .result-screen {
            font-size: 28px;
            height: 50px;
            color: #2ecc71;
            border-color: rgba(46, 204, 113, 0.5);
        }

        .display-box.active-screen {
            border-color: #3498db;
            background-color: rgba(52, 152, 219, 0.2);
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
        }

        .inputs-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.05s, filter 0.15s;
        }

        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.25); }

        .btn-red { background-color: #c0392b; }
        .btn-blue { background-color: #2980b9; }
        .btn-orange { background-color: #d35400; }
        .btn-green { 
            background-color: #27ae60; 
            grid-row: span 2; 
            height: 110px; 
        }
    </style>
</head>
<body>

<canvas id="space-bg"></canvas>

<div class="calculator">
    <div class="screens-container">
        <!-- Bloque Resultado -->
        <div class="screen-group">
            <div class="screen-label label-green">screen-result</div>
            <div class="screen-title title-result">Resultado</div>
            <input type="text" id="screen-result" class="display-box result-screen" readonly placeholder="0">
        </div>

        <!-- Bloque de Entradas A, Operador, B -->
        <div class="inputs-row">
            <div class="screen-group" style="width: 35%;">
                <div class="screen-label label-blue">screen-a</div>
                <div class="screen-title title-a">A</div>
                <input type="text" id="screen-a" class="display-box active-screen" readonly placeholder="" onclick="setTarget('a')">
            </div>

            <div class="screen-group" style="width: 26%;">
                <div class="screen-label label-yellow">op-selector</div>
                <input type="text" id="op-view" class="display-box" style="text-align: center; color: #f1c40f;" readonly placeholder="?">
            </div>

            <div class="screen-group" style="width: 35%;">
                <div class="screen-label label-orange">screen-b</div>
                <div class="screen-title title-b">B</div>
                <input type="text" id="screen-b" class="display-box" readonly placeholder="" onclick="setTarget('b')">
            </div>
        </div>
    </div>

    <!-- Teclado de la captura -->
    <div class="grid">
        <!-- Fila 1 -->
        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-red" onclick="backspace()">⌫</button>
        <button class="btn-orange" onclick="setOp('+')">+</button>
        <button class="btn-orange" onclick="setOp('/')">÷</button>

        <!-- Fila 2 -->
        <button class="btn-blue" onclick="press('7')">7</button>
        <button class="btn-blue" onclick="press('8')">8</button>
        <button class="btn-blue" onclick="press('9')">9</button>
        <button class="btn-orange" onclick="setOp('*')">×</button>

        <!-- Fila 3 -->
        <button class="btn-blue" onclick="press('4')">4</button>
        <button class="btn-blue" onclick="press('5')">5</button>
        <button class="btn-blue" onclick="press('6')">6</button>
        <button class="btn-orange" onclick="setOp('-')">−</button>

        <!-- Fila 4 y 5 -->
        <button class="btn-blue" onclick="press('1')">1</button>
        <button class="btn-blue" onclick="press('2')">2</button>
        <button class="btn-blue" onclick="press('3')">3</button>
        <button class="btn-green" onclick="calculate()">=</button>

        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-blue" onclick="press('0')">0</button>
        <button class="btn-orange" onclick="press('.')">.</button>
    </div>
</div>

<script>
    let currentTarget = 'a';
    let currentOperation = '';
    const screenA = document.getElementById('screen-a');
    const screenB = document.getElementById('screen-b');
    const screenResult = document.getElementById('screen-result');
    const opView = document.getElementById('op-view');

    function setTarget(target) {
        currentTarget = target;
        updateFocusStyles();
    }

    function updateFocusStyles() {
        if (currentTarget === 'a') {
            screenA.classList.add('active-screen');
            screenB.classList.remove('active-screen');
        } else {
            screenB.classList.add('active-screen');
            screenA.classList.remove('active-screen');
        }
    }

    function press(value) {
        if (currentTarget === 'a') {
            screenA.value += value;
        } else {
            screenB.value += value;
        }
    }

    function setOp(op) {
        currentOperation = op;
        let display = op;
        if (display === '/') display = '÷';
        if (display === '*') display = '×';
        opView.value = display;
        
        currentTarget = 'b';
        updateFocusStyles();
    }

    function clearCalculator() {
        screenA.value = '';
        screenB.value = '';
        screenResult.value = '';
        opView.value = '';
        currentTarget = 'a';
        updateFocusStyles();
    }

    function backspace() {
        let active = (currentTarget === 'a') ? screenA : screenB;
        active.value = active.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valA = parseFloat(screenA.value);
            let valB = parseFloat(screenB.value);
            let op = currentOperation;
            let res = 0;

            if (isNaN(valA) || isNaN(valB) || !op) return;

            if (op === '+') res = valA + valB;
            if (op === '-') res = valA - valB;
            if (op === '*') res = valA * valB;
            if (op === '/') {
                if (valB === 0) { screenResult.value = "Error"; return; }
                res = valA / valB;
            }

            screenResult.value = Number(res.toFixed(6)).toString();
        } catch (e) {
            screenResult.value = "Error";
        }
    }

    // Animación de meteoritos
    const canvas = document.getElementById('space-bg');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Meteor {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width * 1.3;
            this.y = Math.random() * -200;
            this.length = Math.random() * 60 + 40;
            this.speed = Math.random() * 5 + 3;
        }
        update() {
            this.x -= this.speed * 0.7;
            this.y += this.speed;
            if (this.y > canvas.height || this.x < -100) this.reset();
        }
        draw() {
            ctx.beginPath();
            let g = ctx.createLinearGradient(this.x, this.y, this.x + this.length * 0.7, this.y - this.length);
            g.addColorStop(0, 'rgba(135, 206, 250, 0.4)'); 
            g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.strokeStyle = g;
            ctx.lineWidth = 1.5;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.length * 0.7, this.y - this.length);
            ctx.stroke();
        }
    }

    const meteors = Array.from({ length: 15 }, () => new Meteor());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        meteors.forEach(m => { m.update(); m.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>
