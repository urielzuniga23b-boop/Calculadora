<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Roja</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fondo de color rojo (un tono carmesí/oscuro elegante para que no canse la vista) */
            background: linear-gradient(135deg, #8b0000, #e60000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .display {
            width: 100%;
            height: 60px;
            background-color: #2d2d2d;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            filter: brightness(1.2);
        }

        /* DISEÑO DE DIFERENTES CUADROS POR CATEGORÍA */
        
        /* Botones de Números (Gris claro) */
        .btn-number {
            background-color: #4a4a4a;
            color: white;
        }

        /* Botones Científicos (Azul oscuro / Gris azulado) */
        .btn-sci {
            background-color: #2c3e50;
            color: #3498db;
            font-size: 14px;
        }

        /* Botones de Operaciones Básicas (Naranja) */
        .btn-op {
            background-color: #d35400;
            color: white;
        }

        /* Botón de Borrar (Rojo brillante) */
        .btn-clear {
            background-color: #c0392b;
            color: white;
        }

        /* Botón de Igualar (Verde) */
        .btn-equal {
            background-color: #27ae60;
            color: white;
            grid-column: span 2; /* Ocupa el espacio de dos cuadros */
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="screen" class="display" readonly placeholder="0">

    <div class="grid">
        <button class="btn-sci" onclick="press('Math.sin(')">sin</button>
        <button class="btn-sci" onclick="press('Math.cos(')">cos</button>
        <button class="btn-sci" onclick="press('Math.tan(')">tan</button>
        <button class="btn-clear" onclick="clearScreen()">C</button>
        <button class="btn-clear" onclick="backspace()">⌫</button>

        <button class="btn-sci" onclick="press('Math.log10(')">log</button>
        <button class="btn-sci" onclick="press('Math.sqrt(')">√</button>
        <button class="btn-sci" onclick="press('Math.PI')">π</button>
        <button class="btn-sci" onclick="press('**')">^</button>
        <button class="btn-op" onclick="press('/')">/</button>

        <button class="btn-number" onclick="press('7')">7</button>
        <button class="btn-number" onclick="press('8')">8</button>
        <button class="btn-number" onclick="press('9')">9</button>
        <button class="btn-sci" onclick="press('(')">(</button>
        <button class="btn-op" onclick="press('*')">*</button>

        <button class="btn-number" onclick="press('4')">4</button>
        <button class="btn-number" onclick="press('5')">5</button>
        <button class="btn-number" onclick="press('6')">6</button>
        <button class="btn-sci" onclick="press(')')">)</button>
        <button class="btn-op" onclick="press('-')">-</button>

        <button class="btn-number" onclick="press('1')">1</button>
        <button class="btn-number" onclick="press('2')">2</button>
        <button class="btn-number" onclick="press('3')">3</button>
        <button class="btn-op" onclick="press('+')">+</button>
        <button class="btn-equal" onclick="calculate()">=</button>

        <button class="btn-number" onclick="press('0')" style="grid-column: span 2;">0</button>
        <button class="btn-number" onclick="press('.')">.</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');

    // Función para escribir en la pantalla al pulsar un botón
    function press(value) {
        screen.value += value;
    }

    // Función para borrar todo
    function clearScreen() {
        screen.value = '';
    }

    // Función para borrar el último carácter escrito
    function backspace() {
        screen.value = screen.value.slice(0, -1);
    }

    // Función para realizar las operaciones matemáticas
    function calculate() {
        try {
            // Evaluamos la expresión matemática escrita en la pantalla
            // Reemplazamos visualmente lo necesario si hace falta, eval hace el cálculo básico
            let expression = screen.value;
            
            // Si hay paréntesis abiertos sin cerrar al final de funciones de JavaScript, intentamos resolverlos
            let result = eval(expression);
            
            if (result === undefined || isNaN(result)) {
                screen.value = "Error";
            } else {
                // Limitamos los decimales largos para que no se salgan de la pantalla
                screen.value = Number(result.toFixed(6)); 
            }
        } catch (error) {
            screen.value = "Error";
        }
    }
</script>

</body>
</html>
