<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Orbital Pro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #010103; /* Fondo base oscuro profundo */
        }

        /* Canvas para el fondo de meteoritos animado */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
        }

        .calculator {
            background-color: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.3);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
        }

        /* Contenedor principal de pantallas individuales (NUEVA LÓGICA) */
        .screens-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        /* Estilo de cada pantalla independiente */
        .display-box {
            background-color: rgba(30, 30, 40, 0.8);
            border: 2px solid #444;
            border-radius: 10px;
            color: #ffffff;
            text-align: right;
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        /* Pantallas de números (Lados) */
        .num-input {
            width: 40%;
            height: 50px;
            font-size: 24px;
        }

        /* Pantalla de operador (Centro) */
        .op-input {
            width: 15%;
            height: 50px;
            font-size: 20px;
            text-align: center;
            color: #f1c40f; /* Color dorado para el operador */
            font-weight: bold;
            border-color: #555;
        }

        /* Halo de foco (Azul para Num1, Verde para Num2) */
        .num-input.active-num1 {
            border-color: #3498db;
            box-shadow: 0 0 12px rgba(52, 152, 219, 0.6);
            background-color: rgba(40, 40, 60, 0.9);
        }

        .num-input.active-num2 {
            border-color: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            background-color: rgba(40, 60, 40, 0.9);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button:active { transform: scale(0.92); }
        button:hover { filter: brightness(1.25); }
        
        /* Categorías de Botones */
        .btn-number { background-color: #3e3e3e; color: white; }
        .btn-sci { background-color: #2c3e50; color: #3498db; font-size: 15px; }
        .btn-op { background-color: #d35400; color: white; }
        .btn-clear { background-color: #c0392b; color: white; }
        .btn-equal { background-color: #27ae60; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<canvas id="space-bg"></canvas>

<div class="calculator">
    <div class="screens-container">
        <input type="text" id="screen-num1" class="display-box num-input active-num1" readonly>
        <input type="text" id="screen-op" class="display-box op-input" readonly>
        <input type="text" id="screen-num2" class="display-box num-input" readonly>
    </div>

    <div class="grid">
        <button class="btn-sci" onclick="setOp('sin')">sin</button>
        <button class="btn-sci" onclick="setOp('cos')">cos</button>
        <button class="btn-sci" onclick="setOp('tan')">tan</button>
        <button class="btn-clear" onclick="clearCalculator()">C</button>
        <button class="btn-clear" onclick="performBackspace()">⌫</button>

        <button class="btn-sci" onclick="setOp('log')">log</button>
        <button class="btn-sci" onclick="setOp('√')">√</button>
        <button class="btn-number" onclick="addNumber('Math.PI')">π</button>
        <button class="btn-sci" onclick="setOp('^')">^</button>
        <button class="btn-sci" onclick="addNumber('(')">(</button>

        <button class="btn-number" onclick="addNumber('7')">7</button>
        <button class="btn-number" onclick="addNumber('8')">8</button>
        <button class="btn-number" onclick="addNumber('9')">9</button>
        <button class="btn-sci" onclick="addNumber(')')">)</button>
        <button class="btn-op" onclick="setOp('/')">/</button>

        <button class="btn-number" onclick="addNumber('4')">4</button>
        <button class="btn-number" onclick="addNumber('5')">5</button>
        <button class="btn-number" onclick="addNumber('6')">6</button>
        <button class="btn-number" onclick="addNumber('.')">.</button>
        <button class="btn-op" onclick="setOp('*')">*</button>

        <button class="btn-number" onclick="addNumber('1')">1</button>
        <button class="btn-number" onclick="addNumber('2')">2</button>
        <button class="btn-number" onclick="addNumber('3')">3</button>
        <button class="btn-op" onclick="setOp('-')">-</button>
        <button class="btn-equal" onclick="calculateResult()">=</button>

        <button class="btn-number" onclick="addNumber('0')" style="grid-column: span 3;">0</button>
        <button class="btn-op" onclick="setOp('+')">+</button>
    </div>
</div>

<script>
    // --- SISTEMA DE ENTRADA CORREGIDO Y FLUJO INSTANTÁNEO ---
    let activeInputTarget = 'num1'; // El primer número empieza activo
    let storedOperator = '';
    
    const sNum1 = document.getElementById('screen-num1');
    const sOp = document.getElementById('screen-op');
    const sNum2 = document.getElementById('screen-num2');

    // Cambia el foco y el halo de color (Azul -> Num1, Verde -> Num2)
    function setTarget(newTarget) {
        activeInputTarget = newTarget;
        if (newTarget === 'num1') {
            sNum1.classList.add('active-num1');
            sNum2.classList.remove('active-num2');
        } else {
            sNum2.classList.add('active-num2');
            sNum1.classList.remove('active-num1');
        }
    }

    // Añade un número a la casilla que esté activa en ese momento
    function addNumber(digit) {
        if (activeInputTarget === 'num1') {
            sNum1.value += digit;
        } else {
            sNum2.value += digit;
        }
    }

    // NUEVA LÓGICA INSTANTÁNEA: Al presionar Operación, se establece el operador Y se salta a Num2
    function setOp(opSymbol) {
        storedOperator = opSymbol;
        sOp.value = opSymbol; // Mostramos el operador dorado en el centro
        
        // --- SALTO INSTANTÁNEO Y DESBLOQUEO DEL SEGUNDO CAMPO ---
        setTarget('num2');
    }

    function clearCalculator() {
        sNum1.value = '';
        sOp.value = '';
        sNum2.value = '';
        storedOperator = '';
        setTarget('num1'); // Volvemos al inicio con halo azul
    }

    function performBackspace() {
        let currentScreen = (activeInputTarget === 'num1') ? sNum1 : sNum2;
        currentScreen.value = currentScreen.value.slice(0, -1);
    }

    function calculateResult() {
        try {
            let expr1_raw = sNum1.value || "0";
            let expr2_raw = sNum2.value || "0";
            
            // Evaluamos las expresiones de ambos campos por si hay paréntesis o PI
            let n1 = eval(expr1_raw.replace(/π/g, 'Math.PI'));
            let n2 = eval(expr2_raw.replace(/π/g, 'Math.PI'));
            let op = storedOperator;
            let finalRes;

            // Ejecutamos la operación lógica seleccionada
            switch (op) {
                case '+': finalRes = n1 + n2; break;
                case '-': finalRes = n1 - n2; break;
                case '*': finalRes = n1 * n2; break;
                case '/': finalRes = n1 / n2; break;
                case '^': finalRes = Math.pow(n1, n2); break;
                case '√': finalRes = Math.sqrt(n1); break;
                case 'sin': finalRes = Math.sin(n1 * Math.PI / 180); break; // Asumimos Grados
                case 'cos': finalRes = Math.cos(n1 * Math.PI / 180); break;
                case 'tan': finalRes = Math.tan(n1 * Math.PI / 180); break;
                case 'log': finalRes = Math.log10(n1); break;
                default: finalRes = n1; // Si no hay operador, muestra n1
            }

            if (isNaN(finalRes) || !isFinite(finalRes)) {
                sNum1.value = "Error";
            } else {
                // Mostramos el resultado simplificado en el primer campo
                let formattedValue = Number(finalRes.toFixed(8)).toString();
                sNum1.value = formattedValue;
            }
            
            // Limpiamos operador y segundo número para la siguiente operación
            sOp.value = '';
            sNum2.value = '';
            storedOperator = '';
            setTarget('num1'); // Volvemos al foco azul en n1 con el resultado

        } catch (error) {
            sNum1.value = "Error";
            sOp.value = '';
            sNum2.value = '';
        }
    }

    // --- MOTOR DE ANIMACIÓN ESPACIAL ARREGLADO (CANVAS) ---
    const canvas = document.getElementById('space-bg');
    const context = canvas.getContext('2d'); // Aseguramos contexto correcto

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Ejecutar inicio

    // 1. ESTRELLAS ESTÁTICAS DE FONDO (Le dan profundidad)
    class Star {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.blinkRate = Math.random() * 0.02 + 0.005;
            this.opacity = Math.random();
        }
        draw() {
            this.opacity += this.blinkRate;
            if (this.opacity > 1 || this.opacity < 0) this.blinkRate *= -1;
            context.fillStyle = `rgba(255, 255, 255, ${Math.abs(this.opacity)})`;
            context.beginPath();
            context.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            context.fill();
        }
    }

    // 2. METEORITOS ANIMADOS (Fugaces)
    class Meteor {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width * 1.5;
            this.y = Math.random() * -300 - 50; // Aparecen arriba fuera de pantalla
            this.length = Math.random() * 120 + 80; // Estela larga
            this.speed = Math.random() * 6 + 4; // Rápidos
            this.thickness = Math.random() * 2 + 1;
            this.alpha = Math.random() * 0.5 + 0.5;
        }
        update() {
            // Movimiento diagonal izquierda-abajo
            this.x -= this.speed * 0.8;
            this.y += this.speed;
            // Reiniciar si salen de la pantalla
            if (this.y > canvas.height + 100 || this.x < -150) { this.reset(); }
        }
        draw() {
            context.beginPath();
            let trailGradient = context.createLinearGradient(this.x, this.y, this.x + this.length * 0.7, this.y - this.length);
            trailGradient.addColorStop(0, `rgba(255, 100, 50, ${this.alpha})`); // Cabeza roja/naranja
            trailGradient.addColorStop(0.3, `rgba(200, 0, 0, ${this.alpha * 0.5})`);
            trailGradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); // Cola invisible
            context.strokeStyle = trailGradient;
            context.lineWidth = this.thickness;
            context.moveTo(this.x, this.y);
            context.lineTo(this.x + this.length * 0.7, this.y - this.length);
            context.stroke();
        }
    }

    // Generar Objetos espaciales
    const starField = Array.from({ length: 150 }, () => new Star());
    const meteorShower = Array.from({ length: 25 }, () => new Meteor());

    // Bucle de Animación Principal (Core)
    function renderSpace() {
        // Fondo negro con leve opacidad para crear el rastro sutil (trail)
        context.fillStyle = 'rgba(1, 1, 3, 0.3)';
        context.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar todo detrás de la calculadora
        starField.forEach(star => star.draw());
        meteorShower.forEach(meteor => {
            meteor.update();
            meteor.draw();
        });

        requestAnimationFrame(renderSpace);
    }

    renderSpace(); // Iniciar animación espacial
</script>

</body>
</html>
