<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Goku Ultra Instinto - Aura Activa</title>
    <style>
        /* Fondo espacial oscuro donde resalta el aura de Goku */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #070f24 0%, #020308 100%);
        }

        /* Canvas de fondo para el aura de Ki en movimiento */
        #aura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Contenedor transparente con efecto de energía Ultra Instinto flotando detrás */
        .calculator {
            background-color: rgba(5, 12, 28, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            /* Borde brillante plateado/azul que simula el límite del Ki */
            border: 2px solid rgba(173, 216, 230, 0.5); 
            box-shadow: 0 0 40px rgba(0, 191, 255, 0.3), 
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 10;
            animation: floatGoku 4s ease-in-out infinite;
        }

        /* Efecto de flotación sutil para la calculadora (como Goku suspendido en el aire) */
        @keyframes floatGoku {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .screens-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .screen-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .screen-label {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
            text-transform: lowercase;
        }

        .label-green { color: #5adbb5; }
        .label-blue { color: #87cefa; }
        .label-yellow { color: #f1c40f; }
        .label-orange { color: #e67e22; }

        .screen-title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .title-result { color: #00ffcc; }
        .title-a { color: #3498db; }
        .title-b { color: #9b59b6; }

        .display-box {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(173, 216, 230, 0.3);
            border-radius: 8px;
            color: #ffffff;
            font-size: 22px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
            width: 100%;
            height: 45px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .result-screen {
            font-size: 28px;
            height: 50px;
            color: #00ffcc;
            border-color: rgba(0, 255, 204, 0.5);
            background-color: rgba(0, 255, 204, 0.05);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
        }

        .display-box.active-screen {
            border-color: #00bfff;
            background-color: rgba(0, 191, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
        }

        .inputs-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.05s, filter 0.15s, box-shadow 0.15s;
        }

        button:active { transform: scale(0.95); }
        button:hover { 
            filter: brightness(1.3); 
            box-shadow: 0 0 10px rgba(135, 206, 250, 0.5);
        }

        /* Colores oscuros y divinos del Ultra Instinto */
        .btn-red { background-color: #7b1fa2; border-color: rgba(123, 31, 162, 0.5); } /* Púrpura destructor */
        .btn-blue { background-color: #1565c0; border-color: rgba(21, 101, 192, 0.5); } /* Azul doctrina */
        .btn-orange { background-color: #0d47a1; border-color: rgba(13, 71, 161, 0.5); } /* Azul profundo */
        .btn-green { 
            background-color: #00897b; 
            grid-row: span 2; 
            height: 110px;
            border-color: rgba(0, 137, 123, 0.5);
            text-shadow: 0 0 5px white;
        }
    </style>
</head>
<body>

<canvas id="aura-bg"></canvas>

<div class="calculator">
    <div class="screens-container">
        <div class="screen-group">
            <div class="screen-label label-green">screen-result</div>
            <div class="screen-title title-result">Resultado</div>
            <input type="text" id="screen-result" class="display-box result-screen" readonly placeholder="0">
        </div>

        <div class="inputs-row">
            <div class="screen-group" style="width: 35%;">
                <div class="screen-label label-blue">screen-a</div>
                <div class="screen-title title-a">A</div>
                <input type="text" id="screen-a" class="display-box active-screen" readonly placeholder="" onclick="setTarget('a')">
            </div>

            <div class="screen-group" style="width: 26%;">
                <div class="screen-label label-yellow">op-selector</div>
                <input type="text" id="op-view" class="display-box" style="text-align: center; color: #f1c40f;" readonly placeholder="?">
            </div>

            <div class="screen-group" style="width: 35%;">
                <div class="screen-label label-orange">screen-b</div>
                <div class="screen-title title-b">B</div>
                <input type="text" id="screen-b" class="display-box" readonly placeholder="" onclick="setTarget('b')">
            </div>
        </div>
    </div>

    <div class="grid">
        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-red" onclick="backspace()">⌫</button>
        <button class="btn-orange" onclick="setOp('+')">+</button>
        <button class="btn-orange" onclick="setOp('/')">÷</button>

        <button class="btn-blue" onclick="press('7')">7</button>
        <button class="btn-blue" onclick="press('8')">8</button>
        <button class="btn-blue" onclick="press('9')">9</button>
        <button class="btn-orange" onclick="setOp('*')">×</button>

        <button class="btn-blue" onclick="press('4')">4</button>
        <button class="btn-blue" onclick="press('5')">5</button>
        <button class="btn-blue" onclick="press('6')">6</button>
        <button class="btn-orange" onclick="setOp('-')">−</button>

        <button class="btn-blue" onclick="press('1')">1</button>
        <button class="btn-blue" onclick="press('2')">2</button>
        <button class="btn-blue" onclick="press('3')">3</button>
        <button class="btn-green" onclick="calculate()">=</button>

        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-blue" onclick="press('0')">0</button>
        <button class="btn-orange" onclick="press('.')">.</button>
    </div>
</div>

<script>
    let currentTarget = 'a';
    let currentOperation = '';
    const screenA = document.getElementById('screen-a');
    const screenB = document.getElementById('screen-b');
    const screenResult = document.getElementById('screen-result');
    const opView = document.getElementById('op-view');

    function setTarget(target) {
        currentTarget = target;
        updateFocusStyles();
    }

    function updateFocusStyles() {
        if (currentTarget === 'a') {
            screenA.classList.add('active-screen');
            screenB.classList.remove('active-screen');
        } else {
            screenB.classList.add('active-screen');
            screenA.classList.remove('active-screen');
        }
    }

    function press(value) {
        if (currentTarget === 'a') {
            screenA.value += value;
        } else {
            screenB.value += value;
        }
    }

    function setOp(op) {
        currentOperation = op;
        let display = op;
        if (display === '/') display = '÷';
        if (display === '*') display = '×';
        opView.value = display;
        
        currentTarget = 'b';
        updateFocusStyles();
    }

    function clearCalculator() {
        screenA.value = '';
        screenB.value = '';
        screenResult.value = '';
        opView.value = '';
        currentTarget = 'a';
        updateFocusStyles();
    }

    function backspace() {
        let active = (currentTarget === 'a') ? screenA : screenB;
        active.value = active.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valA = parseFloat(screenA.value);
            let valB = parseFloat(screenB.value);
            let op = currentOperation;
            let res = 0;

            if (isNaN(valA) || isNaN(valB) || !op) return;

            if (op === '+') res = valA + valB;
            if (op === '-') res = valA - valB;
            if (op === '*') res = valA * valB;
            if (op === '/') {
                if (valB === 0) { screenResult.value = "Error"; return; }
                res = valA / valB;
            }

            screenResult.value = Number(res.toFixed(6)).toString();
        } catch (e) {
            screenResult.value = "Error";
        }
    }

    // --- ANIMACIÓN DIGITAL DEL AURA DE GOKU ULTRA INSTINTO ---
    const canvas = document.getElementById('aura-bg');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class AuraParticle {
        constructor() { this.reset(); this.y = Math.random() * canvas.height; }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 50;
            this.size = Math.random() * 40 + 20; // Partículas de energía grandes
            this.speedY = Math.random() * 2 + 1.5; // El ki sube continuamente
            this.speedX = Math.sin(Math.random() * Math.PI) * 0.8;
            this.alpha = Math.random() * 0.4 + 0.1;
            
            // Colores del Aura: Blanco plateado, Azul claro, Violeta divino
            const colors = ['rgba(255,255,255,', 'rgba(135,206,250,', 'rgba(155,89,182,', 'rgba(240,248,255,'];
            this.baseColor = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            this.alpha -= 0.003; // Se desvanecen al subir
            if (this.y < -60 || this.alpha <= 0) this.reset();
        }
        draw() {
            ctx.save();
            // Creamos un degradado radial para que parezcan flamas de energía suaves
            let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, this.baseColor + this.alpha + ')');
            gradient.addColorStop(0.5, this.baseColor + (this.alpha * 0.4) + ')');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Inicializar 60 flamas de energía para el Aura continua
    const particles = Array.from({ length: 60 }, () => new AuraParticle());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Efecto blend mode para que las energías se sumen y brillen más
        ctx.globalCompositeOperation = 'screen';
        particles.forEach(p => { p.update(); p.draw(); });
        
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
