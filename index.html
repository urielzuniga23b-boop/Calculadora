<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Roja</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8b0000, #e60000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
        }

        .display {
            width: 100%;
            height: 70px;
            background-color: #2d2d2d;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 26px;
            text-align: right;
            padding: 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 52px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            filter: brightness(1.2);
        }
        
        /* Botones de Números (Gris claro) */
        .btn-number {
            background-color: #4a4a4a;
            color: white;
        }

        /* Botones Científicos (Gris azulado) */
        .btn-sci {
            background-color: #2c3e50;
            color: #3498db;
            font-size: 14px;
        }

        /* Botones Especiales (Fracciones / Paréntesis avanzados) */
        .btn-spec {
            background-color: #34495e;
            color: #2ecc71;
            font-size: 15px;
        }

        /* Botones de Operaciones Básicas (Naranja) */
        .btn-op {
            background-color: #d35400;
            color: white;
        }

        /* Botón de Borrar (Rojo brillante) */
        .btn-clear {
            background-color: #c0392b;
            color: white;
        }

        /* Botón de Igualar (Verde) */
        .btn-equal {
            background-color: #27ae60;
            color: white;
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="screen" class="display" readonly placeholder="0">

    <div class="grid">
        <button class="btn-sci" onclick="press('sin(', 'Math.sin(')">sin</button>
        <button class="btn-sci" onclick="press('cos(', 'Math.cos(')">cos</button>
        <button class="btn-sci" onclick="press('tan(', 'Math.tan(')">tan</button>
        <button class="btn-clear" onclick="clearScreen()">C</button>
        <button class="btn-clear" onclick="backspace()">⌫</button>

        <button class="btn-sci" onclick="press('log(', 'Math.log10(')">log</button>
        <button class="btn-sci" onclick="press('√(', 'Math.sqrt(')">√</button>
        <button class="btn-sci" onclick="press('π', 'Math.PI')">π</button>
        <button class="btn-sci" onclick="press('^', '**')">^</button>
        <button class="btn-spec" onclick="press('/', '/')">a/b</button>

        <button class="btn-number" onclick="press('7', '7')">7</button>
        <button class="btn-number" onclick="press('8', '8')">8</button>
        <button class="btn-number" onclick="press('9', '9')">9</button>
        <button class="btn-sci" onclick="press('(', '(')">(</button>
        <button class="btn-op" onclick="press('/', '/')">÷</button>

        <button class="btn-number" onclick="press('4', '4')">4</button>
        <button class="btn-number" onclick="press('5', '5')">5</button>
        <button class="btn-number" onclick="press('6', '6')">6</button>
        <button class="btn-sci" onclick="press(')', ')')">)</button>
        <button class="btn-op" onclick="press('*', '*')">×</button>

        <button class="btn-number" onclick="press('1', '1')">1</button>
        <button class="btn-number" onclick="press('2', '2')">2</button>
        <button class="btn-number" onclick="press('3', '3')">3</button>
        <button class="btn-op" onclick="press('-', '-')">-</button>
        <button class="btn-equal" onclick="calculate()">=</button>

        <button class="btn-number" onclick="press('0', '0')" style="grid-column: span 2;">0</button>
        <button class="btn-number" onclick="press('.', '.')">.</button>
        <button class="btn-op" onclick="press('+', '+')" style="grid-column: span 2;">+</button>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    let realExpression = ""; 
    let logHistory = []; 

    function press(viewValue, mathValue) {
        screen.value += viewValue;
        realExpression += mathValue;
        
        logHistory.push({
            viewLength: viewValue.length,
            mathLength: mathValue.length
        });
    }

    function clearScreen() {
        screen.value = '';
        realExpression = '';
        logHistory = [];
    }

    function backspace() {
        if (logHistory.length > 0) {
            let lastInput = logHistory.pop();
            screen.value = screen.value.slice(0, -lastInput.viewLength);
            realExpression = realExpression.slice(0, -lastInput.mathLength);
        }
    }

    function calculate() {
        try {
            let expr = realExpression;
            
            // Auto-cerrar paréntesis por seguridad
            let openParentheses = (expr.match(/\(/g) || []).length;
            let closeParentheses = (expr.match(/\)/g) || []).length;
            while (openParentheses > closeParentheses) {
                expr += ')';
                closeParentheses++;
            }

            let result = eval(expr);
            
            if (result === undefined || isNaN(result) || !isFinite(result)) {
                screen.value = "Error";
                realExpression = "";
                logHistory = [];
            } else {
                let formattedResult = Number(result.toFixed(6)).toString();
                screen.value = formattedResult;
                realExpression = formattedResult;
                logHistory = [{ viewLength: formattedResult.length, mathLength: formattedResult.length }];
            }
        } catch (error) {
            screen.value = "Error";
            realExpression = "";
            logHistory = [];
        }
    }
</script>

</body>
</html>
