<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Goku Ultra Instinto - Personaje Animado</title>
    <style>
        /* Fondo espacial oscuro */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #060b19 0%, #010205 100%);
        }

        /* Aura de energía en movimiento */
        #aura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* IMAGEN DE GOKU EN MOVIMIENTO (FLOTANDO Y RESPIRANDO) */
        .goku-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            /* Usamos una imagen directa de Goku Ultra Instinto */
            background-image: url('https://images.alphacoders.com/903/903225.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none;
            /* Animación combinada de respiración y flotación */
            animation: gokuLive 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(135, 206, 250, 0.4));
        }

        /* Animación para darle vida a Goku en el fondo */
        @keyframes gokuLive {
            0% {
                transform: translateY(0px) scale(1);
            }
            50% {
                transform: translateY(-12px) scale(1.02); /* Sube y se expande sutilmente como si respirara */
            }
            100% {
                transform: translateY(0px) scale(1);
            }
        }

        /* Contenedor transparente (Estilo Glassmorphism para ver a Goku detrás) */
        .calculator {
            background-color: rgba(5, 12, 28, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(173, 216, 230, 0.4); 
            box-shadow: 0 0 40px rgba(0, 191, 255, 0.25), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 10;
        }

        .screens-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .screen-group {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .screen-label {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
            text-transform: lowercase;
        }

        .label-green { color: #5adbb5; }
        .label-blue { color: #87cefa; }
        .label-yellow { color: #f1c40f; }
        .label-orange { color: #e67e22; }

        .screen-title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .title-result { color: #00ffcc; }
        .title-a { color: #3498db; }
        .title-b { color: #9b59b6; }

        .display-box {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(173, 216, 230, 0.25);
            border-radius: 8px;
            color: #ffffff;
            font-size: 22px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
            width: 100%;
            height: 45px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .result-screen {
            font-size: 28px;
            height: 50px;
            color: #00ffcc;
            border-color: rgba(0, 255, 204, 0.4);
            background-color: rgba(0, 255, 204, 0.03);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
        }

        .display-box.active-screen {
            border-color: #00bfff;
            background-color: rgba(0, 191, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        .inputs-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.05s, filter 0.15s, box-shadow 0.15s;
        }

        button:active { transform: scale(0.95); }
        button:hover { 
            filter: brightness(1.3); 
            box-shadow: 0 0 10px rgba(135, 206, 250, 0.4);
        }

        .btn-red { background-color: #5c148c; border-color: rgba(123, 31, 162, 0.3); } 
        .btn-blue { background-color: #0f4c94; border-color: rgba(21, 101, 192, 0.3); } 
        .btn-orange { background-color: #083170; border-color: rgba(13, 71, 161, 0.3); } 
        .btn-green { 
            background-color: #00695c; 
            grid-row: span 2; 
            height: 110px;
            border-color: rgba(0, 137, 123, 0.3);
            text-shadow: 0 0 5px white;
        }
    </style>
</head>
<body>

<canvas id="aura-bg"></canvas>

<div class="goku-background"></div>

<div class="calculator">
    <div class="screens-container">
        <div class="screen-group">
            <div class="screen-label label-green">screen-result</div>
            <div class="screen-title title-result">Resultado</div>
            <input type="text" id="screen-result" class="display-box result-screen" readonly placeholder="0">
        </div>

        <div class="inputs-row">
            <div class="screen-group" style="width: 35%;">
                <div class="screen-label label-blue">screen-a</div>
                <div class="screen-title title-a">A</div>
                <input type="text" id="screen-a" class="display-box active-screen" readonly placeholder="" onclick="setTarget('a')">
            </div>

            <div class="screen-group" style="width: 26%;">
                <div class="screen-label label-yellow">op-selector</div>
                <input type="text" id="op-view" class="display-box" style="text-align: center; color: #f1c40f;" readonly placeholder="?">
            </div>

            <div class="screen-group" style="width: 35%;">
                <div class="screen-label label-orange">screen-b</div>
                <div class="screen-title title-b">B</div>
                <input type="text" id="screen-b" class="display-box" readonly placeholder="" onclick="setTarget('b')">
            </div>
        </div>
    </div>

    <div class="grid">
        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-red" onclick="backspace()">⌫</button>
        <button class="btn-orange" onclick="setOp('+')">+</button>
        <button class="btn-orange" onclick="setOp('/')">÷</button>

        <button class="btn-blue" onclick="press('7')">7</button>
        <button class="btn-blue" onclick="press('8')">8</button>
        <button class="btn-blue" onclick="press('9')">9</button>
        <button class="btn-orange" onclick="setOp('*')">×</button>

        <button class="btn-blue" onclick="press('4')">4</button>
        <button class="btn-blue" onclick="press('5')">5</button>
        <button class="btn-blue" onclick="press('6')">6</button>
        <button class="btn-orange" onclick="setOp('-')">−</button>

        <button class="btn-blue" onclick="press('1')">1</button>
        <button class="btn-blue" onclick="press('2')">2</button>
        <button class="btn-blue" onclick="press('3')">3</button>
        <button class="btn-green" onclick="calculate()">=</button>

        <button class="btn-red" onclick="clearCalculator()">C</button>
        <button class="btn-blue" onclick="press('0')">0</button>
        <button class="btn-orange" onclick="press('.')">.</button>
    </div>
</div>

<script>
    let currentTarget = 'a';
    let currentOperation = '';
    const screenA = document.getElementById('screen-a');
    const screenB = document.getElementById('screen-b');
    const screenResult = document.getElementById('screen-result');
    const opView = document.getElementById('op-view');

    function setTarget(target) {
        currentTarget = target;
        updateFocusStyles();
    }

    function updateFocusStyles() {
        if (currentTarget === 'a') {
            screenA.classList.add('active-screen');
            screenB.classList.remove('active-screen');
        } else {
            screenB.classList.add('active-screen');
            screenA.classList.remove('active-screen');
        }
    }

    function press(value) {
        if (currentTarget === 'a') {
            screenA.value += value;
        } else {
            screenB.value += value;
        }
    }

    function setOp(op) {
        currentOperation = op;
        let display = op;
        if (display === '/') display = '÷';
        if (display === '*') display = '×';
        opView.value = display;
        currentTarget = 'b';
        updateFocusStyles();
    }

    function clearCalculator() {
        screenA.value = '';
        screenB.value = '';
        screenResult.value = '';
        opView.value = '';
        currentTarget = 'a';
        updateFocusStyles();
    }

    function backspace() {
        let active = (currentTarget === 'a') ? screenA : screenB;
        active.value = active.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valA = parseFloat(screenA.value);
            let valB = parseFloat(screenB.value);
            let op = currentOperation;
            let res = 0;
            if (isNaN(valA) || isNaN(valB) || !op) return;
            if (op === '+') res = valA + valB;
            if (op === '-') res = valA - valB;
            if (op === '*') res = valA * valB;
            if (op === '/') {
                if (valB === 0) { screenResult.value = "Error"; return; }
                res = valA / valB;
            }
            screenResult.value = Number(res.toFixed(6)).toString();
        } catch (e) {
            screenResult.value = "Error";
        }
    }

    // --- ANIMACIÓN INTERACTIVA DEL AURA DE KI ---
    const canvas = document.getElementById('aura-bg');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class AuraParticle {
        constructor() { this.reset(); this.y = Math.random() * canvas.height; }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 50;
            this.size = Math.random() * 50 + 25; 
            this.speedY = Math.random() * 2.5 + 1.5; 
            this.speedX = Math.sin(Math.random() * Math.PI) * 0.6;
            this.alpha = Math.random() * 0.35 + 0.1;
            const colors = ['rgba(255,255,255,', 'rgba(135,206,250,', 'rgba(165,105,189,', 'rgba(224,242,241,'];
            this.baseColor = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            this.alpha -= 0.0025;
            if (this.y < -60 || this.alpha <= 0) this.reset();
        }
        draw() {
            ctx.save();
            let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, this.baseColor + this.alpha + ')');
            gradient.addColorStop(0.6, this.baseColor + (this.alpha * 0.3) + ')');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    const particles = Array.from({ length: 50 }, () => new AuraParticle());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = 'screen';
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();
</script>

</body>
</html>
