<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Espacial</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050510;
        }

        /* Canvas para el fondo de meteoritos animado */
        #space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .calculator {
            background-color: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(230, 0, 0, 0.25);
            border: 1px solid rgba(230, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        /* Contenedor principal de pantallas individuales */
        .screens-container {
            display: flex;
            flex-direction: column;
            gap: 12px; /* Espacio de separación entre ambas pantallas */
            margin-bottom: 20px;
        }

        /* Estilo de cada pantalla independiente */
        .display-box {
            width: 100%;
            height: 45px;
            background-color: #2d2d2d;
            border: 2px solid #444;
            border-radius: 8px;
            color: #ffffff;
            font-size: 22px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Efecto cuando la pantalla de ARRIBA está seleccionada */
        .display-box.active-top {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.5);
        }

        /* Efecto cuando la pantalla de ABAJO está seleccionada */
        .display-box.active-bottom {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
        }

        button:active { transform: scale(0.95); }
        button:hover { filter: brightness(1.2); }
        
        .btn-number { background-color: #4a4a4a; color: white; }
        .btn-sci { background-color: #2c3e50; color: #3498db; font-size: 14px; }
        .btn-op { background-color: #d35400; color: white; }
        .btn-clear { background-color: #c0392b; color: white; }
        .btn-equal { background-color: #27ae60; color: white; grid-column: span 2; }
        
        /* Botón para alternar cómodamente */
        .btn-toggle {
            background-color: #8e44ad;
            color: #f1c40f;
            font-size: 13px;
        }
    </style>
</head>
<body>

<canvas id="space-bg"></canvas>

<div class="calculator">
    <div class="screens-container">
        <input type="text" id="screen-top" class="display-box active-top" readonly placeholder="" onclick="switchScreen('top')">
        <input type="text" id="screen-bottom" class="display-box" readonly placeholder="" onclick="switchScreen('bottom')">
    </div>

    <div class="grid">
        <button class="btn-sci" onclick="press('Math.sin(')">sin</button>
        <button class="btn-sci" onclick="press('Math.cos(')">cos</button>
        <button class="btn-sci" onclick="press('Math.tan(')">tan</button>
        <button class="btn-clear" onclick="clearScreen()">C</button>
        <button class="btn-clear" onclick="backspace()">⌫</button>

        <button class="btn-sci" onclick="press('Math.log10(')">log</button>
        <button class="btn-sci" onclick="press('Math.sqrt(')">√</button>
        <button class="btn-sci" onclick="press('Math.PI')">π</button>
        <button class="btn-sci" onclick="press('**')">^</button>
        <button class="btn-toggle" onclick="toggleScreen()">⬘/⬙</button>

        <button class="btn-number" onclick="press('7')">7</button>
        <button class="btn-number" onclick="press('8')">8</button>
        <button class="btn-number" onclick="press('9')">9</button>
        <button class="btn-sci" onclick="press('(')">(</button>
        <button class="btn-op" onclick="press('/')">/</button>

        <button class="btn-number" onclick="press('4')">4</button>
        <button class="btn-number" onclick="press('5')">5</button>
        <button class="btn-number" onclick="press('6')">6</button>
        <button class="btn-sci" onclick="press(')')">)</button>
        <button class="btn-op" onclick="press('*')">*</button>

        <button class="btn-number" onclick="press('1')">1</button>
        <button class="btn-number" onclick="press('2')">2</button>
        <button class="btn-number" onclick="press('3')">3</button>
        <button class="btn-op" onclick="press('-')">-</button>
        <button class="btn-equal" onclick="calculate()">=</button>

        <button class="btn-number" onclick="press('0')" style="grid-column: span 2;">0</button>
        <button class="btn-number" onclick="press('.')">.</button>
        <button class="btn-op" onclick="press('+')" style="grid-column: span 2;">+</button>
    </div>
</div>

<script>
    // --- SISTEMA DE ENTRADA Y PANTALLAS ---
    let currentTarget = 'top'; 
    const screenTop = document.getElementById('screen-top');
    const screenBottom = document.getElementById('screen-bottom');

    function updateFocusClass() {
        if (currentTarget === 'top') {
            screenTop.classList.add('active-top');
            screenBottom.classList.remove('active-bottom');
        } else {
            screenBottom.classList.add('active-bottom');
            screenTop.classList.remove('active-top');
        }
    }

    function switchScreen(target) {
        currentTarget = target;
        updateFocusClass();
    }

    function toggleScreen() {
        currentTarget = (currentTarget === 'top') ? 'bottom' : 'top';
        updateFocusClass();
    }

    function press(value) {
        if (currentTarget === 'top') {
            screenTop.value += value;
        } else {
            screenBottom.value += value;
        }
    }

    function clearScreen() {
        screenTop.value = '';
        screenBottom.value = '';
        currentTarget = 'top';
        updateFocusClass();
    }

    function backspace() {
        let activeScreen = (currentTarget === 'top') ? screenTop : screenBottom;
        activeScreen.value = activeScreen.value.slice(0, -1);
    }

    function calculate() {
        try {
            let valTop = screenTop.value.trim() || "0";
            let valBottom = screenBottom.value.trim() || "1";

            let resTop = eval(valTop);
            let resBottom = eval(valBottom);

            let finalResult = resTop / resBottom;

            if (isNaN(finalResult) || !isFinite(finalResult)) {
                screenTop.value = "Error";
                screenBottom.value = "";
            } else {
                screenTop.value = Number(finalResult.toFixed(6));
                screenBottom.value = "";
                currentTarget = 'top';
                updateFocusClass();
            }
        } catch (error) {
            screenTop.value = "Error";
            screenBottom.value = "";
        }
    }

    // --- ANIMACIÓN CORREGIDA DE METEORITOS ---
    const canvas = document.getElementById('space-bg');
    const context = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Meteor {
        constructor() {
            this.reset();
        }

        reset() {
            // Aparecen un poco más a la derecha para cruzar cómodamente en diagonal
            this.x = Math.random() * canvas.width * 1.4;
            this.y = Math.random() * -100 - 20;
            this.length = Math.random() * 90 + 50; 
            this.speed = Math.random() * 4 + 3;     
            this.thickness = Math.random() * 2 + 1; 
            this.alpha = Math.random() * 0.4 + 0.6; 
        }

        update() {
            this.x -= this.speed * 0.8;
            this.y += this.speed;

            if (this.y > canvas.height + 50 || this.x < -100) {
                this.reset();
            }
        }

        draw() {
            context.beginPath();
            let gradient = context.createLinearGradient(this.x, this.y, this.x + this.length * 0.7, this.y - this.length);
            gradient.addColorStop(0, `rgba(255, 75, 43, ${this.alpha})`);  
            gradient.addColorStop(0.2, `rgba(255, 12, 12, ${this.alpha * 0.4})`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');                  

            context.strokeStyle = gradient;
            context.lineWidth = this.thickness;
            context.moveTo(this.x, this.y);
            context.lineTo(this.x + this.length * 0.7, this.y - this.length);
            context.stroke();
        }
    }

    const meteors = [];
    const maxMeteors = 20; // Cantidad de estrellas fugaces simultáneas
    for (let i = 0; i < maxMeteors; i++) {
        meteors.push(new Meteor());
    }

    function animate() {
        // Fondo con leve opacidad para crear el efecto estela (trail) en los meteoritos
        context.fillStyle = 'rgba(5, 5, 16, 0.2)';
        context.fillRect(0, 0, canvas.width, canvas.height);

        meteors.forEach(meteor => {
            meteor.update();
            meteor.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
