<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Órbita Goku UI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Fondo base oscuro profundo */
            background-color: #010103;
        }

        /* Contenedor para el fondo GIF animado */
        #ui-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Asegura que esté detrás de todo */
            /* Enlace al GIF proporcionado */
            background-image: url('https://cdn.discordapp.com/attachments/1117189679691923588/1199343354921934908/Goku_Ultra_Instinct_Back.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: block;
        }

        .calculator {
            /* Transparencia para ver el fondo */
            background-color: rgba(15, 15, 25, 0.75);
            backdrop-filter: blur(10px); /* Efecto cristal */
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(52, 152, 219, 0.3); /* Brillo azulado */
            border: 2px solid rgba(52, 152, 219, 0.4);
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
        }

        /* Contenedor principal de pantallas individuales */
        .screens-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        /* Estilo de cada pantalla independiente */
        .display-box {
            /* Transparencia para ver el fondo */
            background-color: rgba(30, 30, 40, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #ffffff;
            text-align: right;
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Pantallas de números (Lados) */
        .num-input {
            width: 40%;
            height: 50px;
            font-size: 24px;
        }

        /* Pantalla de operador (Centro) */
        .op-input {
            width: 15%;
            height: 50px;
            font-size: 20px;
            text-align: center;
            color: #f1c40f; /* Color dorado para el operador */
            font-weight: bold;
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Efecto cuando la pantalla de entrada está seleccionada */
        .display-box.active-screen {
            border-color: #3498db;
            box-shadow: 0 0 12px rgba(52, 152, 219, 0.6);
            background-color: rgba(40, 40, 60, 0.8);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button:active { transform: scale(0.92); }
        button:hover { filter: brightness(1.25); }
        
        /* Colores de Botones y Transparencias */
        .btn-number { background-color: rgba(62, 62, 62, 0.8); color: white; }
        .btn-sci { background-color: rgba(44, 62, 80, 0.8); color: #3498db; font-size: 15px; }
        .btn-op { background-color: rgba(211, 84, 0, 0.8); color: white; }
        .btn-clear { background-color: rgba(192, 57, 43, 0.8); color: white; }
        .btn-equal { background-color: rgba(39, 174, 96, 0.8); color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div id="ui-background"></div>

<div class="calculator">
    <div class="screens-container">
        <input type="text" id="screen-num1" class="display-box num-input active-screen" readonly onclick="setTarget('num1')">
        <input type="text" id="screen-op" class="display-box op-input" readonly>
        <input type="text" id="screen-num2" class="display-box num-input" readonly onclick="setTarget('num2')">
    </div>

    <div class="grid">
        <button class="btn-sci" onclick="setOp('sin')">sin</button>
        <button class="btn-sci" onclick="setOp('cos')">cos</button>
        <button class="btn-sci" onclick="setOp('tan')">tan</button>
        <button class="btn-clear" onclick="clearCalculator()">C</button>
        <button class="btn-clear" onclick="performBackspace()">⌫</button>

        <button class="btn-sci" onclick="setOp('log')">log</button>
        <button class="btn-sci" onclick="setOp('√')">√</button>
        <button class="btn-number" onclick="addNumber('Math.PI')">π</button>
        <button class="btn-sci" onclick="setOp('^')">^</button>
        <button class="btn-sci" onclick="addNumber('(')">(</button>

        <button class="btn-number" onclick="addNumber('7')">7</button>
        <button class="btn-number" onclick="addNumber('8')">8</button>
        <button class="btn-number" onclick="addNumber('9')">9</button>
        <button class="btn-sci" onclick="addNumber(')')">)</button>
        <button class="btn-op" onclick="setOp('/')">/</button>

        <button class="btn-number" onclick="addNumber('4')">4</button>
        <button class="btn-number" onclick="addNumber('5')">5</button>
        <button class="btn-number" onclick="addNumber('6')">6</button>
        <button class="btn-number" onclick="addNumber('.')">.</button>
        <button class="btn-op" onclick="setOp('*')">*</button>

        <button class="btn-number" onclick="addNumber('1')">1</button>
        <button class="btn-number" onclick="addNumber('2')">2</button>
        <button class="btn-number" onclick="addNumber('3')">3</button>
        <button class="btn-op" onclick="setOp('-')">-</button>
        <button class="btn-equal" onclick="calculateResult()">=</button>

        <button class="btn-number" onclick="addNumber('0')" style="grid-column: span 3;">0</button>
        <button class="btn-op" onclick="setOp('+')">+</button>
    </div>
</div>

<script>
    // --- LÓGICA DE LA CALCULADORA (Mismo script, solo ajustado para limpieza) ---
    let currentInputTarget = 'num1'; 
    let currentOperator = '';
    
    const sNum1 = document.getElementById('screen-num1');
    const sOp = document.getElementById('screen-op');
    const sNum2 = document.getElementById('screen-num2');

    function setTarget(target) {
        currentInputTarget = target;
        updateFocusStyles();
    }

    function updateFocusStyles() {
        if (currentInputTarget === 'num1') {
            sNum1.classList.add('active-screen');
            sNum2.classList.remove('active-screen');
        } else {
            sNum2.classList.add('active-screen');
            sNum1.classList.remove('active-screen');
        }
    }

    function addNumber(val) {
        if (currentInputTarget === 'num1') {
            sNum1.value += val;
        } else {
            sNum2.value += val;
        }
    }

    function setOp(op) {
        currentOperator = op;
        sOp.value = op; 
        currentInputTarget = 'num2';
        updateFocusStyles();
    }

    function clearCalculator() {
        sNum1.value = '';
        sOp.value = '';
        sNum2.value = '';
        currentOperator = '';
        currentInputTarget = 'num1';
        updateFocusStyles();
    }

    function performBackspace() {
        let activeScreen = (currentInputTarget === 'num1') ? sNum1 : sNum2;
        activeScreen.value = activeScreen.value.slice(0, -1);
    }

    function calculateResult() {
        try {
            let n1_raw = sNum1.value || "0";
            let n2_raw = sNum2.value || "0";
            
            let n1 = eval(n1_raw.replace(/π/g, 'Math.PI'));
            let n2 = eval(n2_raw.replace(/π/g, 'Math.PI'));
            let op = currentOperator;
            let result;

            switch (op) {
                case '+': result = n1 + n2; break;
                case '-': result = n1 - n2; break;
                case '*': result = n1 * n2; break;
                case '/': result = n1 / n2; break;
                case '^': result = Math.pow(n1, n2); break;
                case '√': result = Math.sqrt(n1); break;
                case 'sin': result = Math.sin(n1 * Math.PI / 180); break; 
                case 'cos': result = Math.cos(n1 * Math.PI / 180); break;
                case 'tan': result = Math.tan(n1 * Math.PI / 180); break;
                case 'log': result = Math.log10(n1); break;
                default: result = n1;
            }

            if (isNaN(result) || !isFinite(result)) {
                sNum1.value = "Error";
            } else {
                let formattedRes = Number(result.toFixed(8)).toString();
                sNum1.value = formattedRes;
            }
            
            sOp.value = '';
            sNum2.value = '';
            currentOperator = '';
            currentInputTarget = 'num1';
            updateFocusStyles();

        } catch (error) {
            sNum1.value = "Error";
            sOp.value = '';
            sNum2.value = '';
        }
    }
</script>

</body>
</html>
